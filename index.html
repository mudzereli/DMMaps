<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dark Mists Maps</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h2>Areas</h2>
      <select id="areaSelect" aria-label="Select area" style="width:100%;margin-bottom:8px;padding:6px;border-radius:6px"></select>
      <div id="areaCount" style="margin-bottom:8px;color:var(--muted)"></div>
      <ul id="areaList"></ul>
      <div id="roomInfo" style="margin-top:12px;padding-top:8px;border-top:1px solid #eee"></div>
    </aside>
    <main id="viewer">
      <div id="controls">
        <div id="layerControls" style="display:inline-flex;align-items:center;gap:6px;margin-left:8px">
          <button id="layerPrev" title="Previous floor">◀</button>
          <span id="layerDisplay" style="min-width:48px;text-align:center;color:var(--muted)">Floor 0</span>
          <button id="layerNext" title="Next floor">▶</button>
        </div>
        <div style="flex:1"></div>
        <span id="areaTitle"></span>
        <span id="savedIndicator" style="margin-left:8px;color:var(--muted);display:none">💾 Saved positions</span>
        <details class="tools-menu" role="menu">
          <summary aria-haspopup="true">Tools ▾</summary>
          <div class="tools-list">
            <button id="savePositions">Save Positions</button>
            <button id="exportArea">Export Area</button>
            <button id="clearSavedPositions">Clear Saved Positions</button>
            <button id="redrawFromSelected">Redraw From Selected</button>
            <button id="redrawFromSelectedLayer">Redraw Current Floor</button>
          </div>
        </details>
      </div>
      <div id="mapContainer">
        <!-- SVG map will be injected here -->
      </div>
      <!-- Pan / Zoom overlay -->
      <div id="overlayControls" aria-hidden="false">
        <div class="dir-wrap">
          <div class="dir-grid" role="group" aria-label="Pan controls">
            <button class="dir-btn" data-dir="u">U</button>
            <button class="dir-btn" data-dir="n">N</button>
            <button class="dir-btn" data-dir="d">D</button>

            <button class="dir-btn" data-dir="w">W</button>
            <button class="dir-btn" data-dir="s">S</button>
            <button class="dir-btn" data-dir="e">E</button>
          </div>
          <div class="pan-buttons">
            <button class="pan-btn" data-pan="n">↑</button>
            <button class="pan-btn" data-pan="s">↓</button>
          </div>
          <div class="pan-buttons">
            <button class="pan-btn" data-pan="w">←</button>
            <button class="pan-btn" data-pan="e">→</button>
          </div>
          <div class="zoom-buttons">
            <button id="zoomIn">+</button>
            <button id="zoomOut">−</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="mapColors.js"></script>
  <script src="areas.js"></script>
  <script src="utils.js"></script>
  <!-- Optional: drop a file named `area_adjustments/adjustments.js` that sets `window.areaAdjustments` -->
  <script src="area_adjustments/adjustments.js"></script>
  <script src="app.js"></script>
</body>
</html>
